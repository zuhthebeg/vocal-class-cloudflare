name = "vocal-class"
compatibility_date = "2025-10-11"
pages_build_output_dir = "."

# Git 연동 배포 시 아래 설정은 Cloudflare Dashboard에서 직접 설정해야 합니다:
# 1. Settings → Functions → D1 database bindings → Add binding
#    - Variable name: DB
#    - D1 database: vocal-class-db
#
# 2. Settings → Environment variables → Add variable
#    - Variable name: GEMINI_API_KEY
#    - Value: (실제 API 키)
#
# 3. R2 버킷 (선택사항)
#    - Variable name: STORAGE
#    - R2 bucket: vocal-class-storage

# 로컬 개발용 설정 (wrangler pages dev)
[[d1_databases]]
binding = "DB"
database_name = "vocal-class-db"
database_id = "9f90ac1e-f6d8-4a9b-9e9d-2ae5548ac054"

# 로컬 개발용 환경 변수
# Git 연동 배포 시 충돌 방지를 위해 주석 처리
# (로컬 개발 시에만 주석 해제하여 사용)
